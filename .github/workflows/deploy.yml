name: Deploy Blog

on:
  push:
    branches: [main]
    paths-ignore:
      - ".admin/drafts/**"
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: deploy-blog
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check anime-related changes
        id: anime_changes
        if: github.event_name == 'push'
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^(scripts/sync-anime\.mjs|src/config\.ts|src/data/anime-cache\.json|public/anime-covers/|src/pages/anime|src/components/AnimePage\.astro|src/utils/anime\.ts)' >/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync anime data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || steps.anime_changes.outputs.changed == 'true'
        run: pnpm sync-anime
        env:
          BANGUMI_TOKEN: ${{ secrets.BANGUMI_TOKEN }}

      - name: Build site
        run: pnpm build:optimized

      - name: Package dist
        run: cd dist && zip -qr ../dist.zip .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload dist package
        run: scp -i ~/.ssh/deploy_key dist.zip "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_TARGET_ZIP }}"

      - name: Deploy on VPS
        run: ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" deploy-blog
